apiVersion: v2
name: librenms
description: LibreNMS is an autodiscovering PHP/MySQL-based network monitoring system.
type: application
version: 8.2.2
appVersion: "26.6.1"
maintainers:
  - name: jacobw
    url: https://github.com/jacobw
dependencies:
  - name: redis
    version: "1.6.19"
    repository: "https://repo.helmforge.dev"
    condition: redis.enabled
  - name: mysql
    version: "~1.8.0"
    repository: "https://repo.helmforge.dev"
    condition: mysql.enabled
